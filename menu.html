<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Aplikasi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu-body">
    <div class="container menu-container">
        <h2>👤 Identifikasi Pengguna</h2>
        <input type="text" id="namaUser" class="input-nama" placeholder="Masukkan nama Anda..." autocomplete="off">
        
        <div class="tombol-menu-container">
            <button class="tombol-aksi tombol-calc1" onclick="goTo('calculator1.html')">
                🧮 Kalkulator Standar
            </button>
            <button class="tombol-aksi tombol-calc2" onclick="goTo('kalkulator2.html')">
                📒 Buku Kas Keuangan
            </button>
        </div>
        <button class="back-home" onclick="location.href='index.html'">🏠 Kembali ke Beranda</button>
    </div>
    <script>
        function goTo(halaman) {
            let nama = document.getElementById('namaUser').value.trim();
            if(nama === "") nama = "Pengguna";
            localStorage.setItem('namaPengguna', nama);
            window.location.href = halaman;
        }
    </script>
</body>
</html>
