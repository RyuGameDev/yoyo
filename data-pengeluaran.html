<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pengeluaran</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="data-body">
    <div class="container data-container">
        <div class="header-nav">
            <a href="index.html">🏠 Beranda</a>
            <a href="tentang-akuntansi.html">📖 Tentang</a>
            <a href="data-pemasukan.html">💚 Pemasukan</a>
            <a href="data-pengeluaran.html">❤️ Pengeluaran</a>
            <a href="laporan.html">📊 Laporan</a>
            <a href="kontak.html">📞 Kontak</a>
            <a href="menu.html">🔧 Menu Tools</a>
        </div>

        <h1>❤️ Data Pengeluaran</h1>
        <div class="form-tambah">
            <h3>Tambah Pengeluaran Baru</h3>
            <div class="form-row">
                <input type="date" id="tglKeluar" placeholder="Tanggal">
                <input type="text" id="keperluan" placeholder="Keperluan (contoh: Jajan, Pulsa, Transport)">
                <input type="number" id="jumlahKeluar" placeholder="Jumlah (Rp)">
                <button id="btnTambahKeluar" class="btn-tambah">➕ Tambah</button>
            </div>
        </div>

        <div class="tabel-wrapper">
            <table class="tabel-data">
                <thead>
                    <tr><th>Tanggal</th><th>Keperluan</th><th>Jumlah (Rp)</th><th>Aksi</th></tr>
                </thead>
                <tbody id="tabelPengeluaran"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        let pengeluaran = JSON.parse(localStorage.getItem('yoyo_pengeluaran')) || [];

        function renderPengeluaran() {
            const tbody = document.getElementById('tabelPengeluaran');
            if(pengeluaran.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Belum ada data pengeluaran.</td></tr>';
                return;
            }
            tbody.innerHTML = pengeluaran.map((item, idx) => `
                <tr>
                    <td>${item.tanggal}</td>
                    <td>${item.keperluan}</td>
                    <td>${formatRupiah(item.jumlah)}</td>
                    <td><button class="btn-hapus" data-idx="${idx}">Hapus</button></td>
                </tr>
            `).join('');
            document.querySelectorAll('.btn-hapus').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = btn.getAttribute('data-idx');
                    pengeluaran.splice(idx, 1);
                    localStorage.setItem('yoyo_pengeluaran', JSON.stringify(pengeluaran));
                    renderPengeluaran();
                });
            });
        }

        document.getElementById('btnTambahKeluar').addEventListener('click', () => {
            const tanggal = document.getElementById('tglKeluar').value;
            const keperluan = document.getElementById('keperluan').value.trim();
            const jumlah = parseFloat(document.getElementById('jumlahKeluar').value);
            if(!tanggal || !keperluan || isNaN(jumlah) || jumlah <= 0) {
                alert("Lengkapi semua data (tanggal, keperluan, jumlah > 0)");
                return;
            }
            pengeluaran.push({ tanggal, keperluan, jumlah });
            localStorage.setItem('yoyo_pengeluaran', JSON.stringify(pengeluaran));
            document.getElementById('tglKeluar').value = '';
            document.getElementById('keperluan').value = '';
            document.getElementById('jumlahKeluar').value = '';
            renderPengeluaran();
        });

        renderPengeluaran();
    </script>
</body>
</html>
